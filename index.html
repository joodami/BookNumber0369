<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>ระบบขอเลขบันทึกข้อความ ปี 2569</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Prompt&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex flex-column min-vh-100">

<!-- Banner -->
<div class="banner-wrapper">
  <img src="https://raw.githubusercontent.com/joodami/school-assets/main/banner0369.jpg"
     class="banner-img"
     alt="banner">
</div>

<!-- Container -->
<div class="container-fluid px-2 px-md-4 text-center max-width-container">

  <!-- Dashboard -->
  <div class="card shadow-sm rounded-4 mb-4">
    <div class="card-body">
      <div class="dashboard-row">
        <div class="dash-item">
          <span class="dash-icon">📊</span>
          <div class="dash-text">
            <small>ทั้งหมด</small>
            <div class="dash-number" id="dash-total">0</div>
          </div>
        </div>
        <div class="dash-item">
          <span class="dash-icon">📅</span>
          <div class="dash-text">
            <small>วันนี้</small>
            <div class="dash-number" id="dash-today">0</div>
          </div>
        </div>
        <div class="dash-item">
          <span class="dash-icon">👤</span>
          <div class="dash-text">
            <small>ออนไลน์</small>
            <div class="dash-number" id="dash-online">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Login -->
  <div class="card form-card shadow-sm rounded-4">
    <div class="card-header fw-bold">ลงชื่อเข้าใช้ระบบขอเลขบันทึกข้อความ</div>
    <div class="card-body">
      <div class="mb-3 position-relative">
        <input type="password" id="password" class="form-control" placeholder="กรอกหมายเลขโทรศัพท์">
        <span id="togglePassword"
              class="position-absolute top-50 end-0 translate-middle-y me-3"
              style="cursor:pointer;">
          <i class="bi bi-eye"></i>
        </span>
        <div class="invalid-feedback" id="password-feedback">กรุณากรอกรหัส</div>
      </div>

      <button class="btn btn-primary w-100" id="btn-login">เข้าสู่ระบบ</button>

      <div id="loginSpinner" class="d-none text-center mt-3">
        <div class="spinner-border text-primary"></div>
        <p class="small mt-2">กำลังเข้าสู่ระบบ...</p>
      </div>
    </div>
  </div>

  <!-- User Form -->
  <div id="userform" class="card form-card shadow-sm rounded-4 mt-4 invisible">
    <div class="card-header fw-bold">บันทึกข้อมูล</div>
    <div class="card-body text-start">

      <div class="mb-3">
        <label>วันที่</label>
        <input type="date" id="birthday" class="form-control">
      </div>

      <div class="mb-3">
        <label>เรื่อง</label>
        <textarea id="detail" class="form-control"></textarea>
      </div>

      <div class="mb-3">
        <label>ผู้ปฏิบัติ</label>
        <textarea id="department" class="form-control"></textarea>
      </div>

      <div class="mb-3">
        <label>ผู้บันทึก</label>
        <input id="user" class="form-control" disabled>
      </div>

      <button type="button" class="btn btn-success w-100" id="btn-submit">
        รับเลขบันทึกข้อความ
      </button>

    </div>
  </div>

</div>

<!-- Footer -->
<footer id="main-footer">
  <small>© 2569 ระบบขอเลขบันทึกข้อความ | พัฒนาโดยงานสารบรรณโรงเรียน</small>
</footer>

<!-- ===== Modal ===== -->
<div class="modal fade" id="resultModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">

      <!-- Loading -->
      <div id="modal-loading">
        <i class="bi bi-hourglass-split modal-icon text-primary"></i>
        <p class="mt-3">
          กำลังออกเลขบันทึกข้อความ<br>
          โปรดรอ...
        </p>
      </div>

      <!-- Success -->
      <div id="modal-success" class="d-none">
        <i class="bi bi-check-circle-fill modal-icon text-success"></i>
        <h5 class="mt-3">ออกเลขสำเร็จ</h5>
        <p id="show-bookno" class="fw-bold"></p>
        <button class="btn btn-primary mt-2" data-bs-dismiss="modal">
          ปิด
        </button>
      </div>

      <!-- Error -->
      <div id="modal-error" class="d-none">
        <i class="bi bi-x-circle-fill modal-icon text-danger"></i>
        <h5 class="mt-3">เกิดข้อผิดพลาด</h5>
        <p></p>
        <button class="btn btn-secondary mt-2">
          ปิด
        </button>
      </div>

    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js?v=123"></script>
</body>
</html>
